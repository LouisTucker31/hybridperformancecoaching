<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- background: brand white -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- subtle soft-grey band anchoring the lower third, echoing site .band -->
  <rect x="0" y="470" width="1200" height="160" fill="#f6f7f6"/>
  <line x1="0" y1="470" x2="1200" y2="470" stroke="#e7e9e8" stroke-width="1"/>

  <!-- top hairline like the sticky header border -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#e7e9e8" stroke-width="2"/>

  <!-- ===== LEFT: wordmark + tagline ===== -->
  <text x="80" y="150" font-family="Inter" font-weight="700" font-size="34"
        letter-spacing="-0.5" fill="#1f6b52">Hybrid Performance.</text>

  <!-- eyebrow -->
  <text x="80" y="250" font-family="Inter" font-weight="600" font-size="20"
        letter-spacing="3" fill="#1f6b52">STRENGTH · SIZE · ENDURANCE</text>

  <!-- headline -->
  <text x="78" y="322" font-family="Inter" font-weight="800" font-size="64"
        letter-spacing="-1.5" fill="#1a1d1b">Train for strength</text>
  <text x="78" y="392" font-family="Inter" font-weight="800" font-size="64"
        letter-spacing="-1.5" fill="#1a1d1b">and endurance,</text>
  <text x="78" y="462" font-family="Inter" font-weight="800" font-size="64"
        letter-spacing="-1.5" fill="#1a1d1b">in one plan.</text>

  <!-- tagline in the soft band -->
  <text x="80" y="556" font-family="Inter" font-weight="400" font-size="26"
        fill="#54595a">Coaching, training plans and free tools for hybrid athletes.</text>

  <!-- ===== RIGHT: the signature bar-chart-to-flag motif ===== -->
  <g transform="translate(792,150)">
    <!-- baseline -->
    <line x1="0" y1="250" x2="360" y2="250" stroke="#e7e9e8" stroke-width="1.5"/>
    <!-- dashed gridlines -->
    <g stroke="#e7e9e8" stroke-width="1" stroke-dasharray="3 6">
      <line x1="0" y1="190" x2="360" y2="190"/>
      <line x1="0" y1="130" x2="360" y2="130"/>
      <line x1="0" y1="70"  x2="360" y2="70"/>
    </g>
    <!-- bars: base -> build -> peak -> taper -->
    <g fill="#1f6b52">
      <rect x="8"   y="208" width="18" height="42"  rx="3" opacity="0.55"/>
      <rect x="34"  y="192" width="18" height="58"  rx="3" opacity="0.55"/>
      <rect x="60"  y="176" width="18" height="74"  rx="3" opacity="0.55"/>
      <rect x="86"  y="214" width="18" height="36"  rx="3" opacity="0.35"/>
      <rect x="118" y="152" width="18" height="98"  rx="3" opacity="0.70"/>
      <rect x="144" y="132" width="18" height="118" rx="3" opacity="0.70"/>
      <rect x="170" y="112" width="18" height="138" rx="3" opacity="0.70"/>
      <rect x="196" y="164" width="18" height="86"  rx="3" opacity="0.40"/>
      <rect x="228" y="92"  width="18" height="158" rx="3" opacity="0.90"/>
      <rect x="254" y="78"  width="18" height="172" rx="3" opacity="0.90"/>
      <rect x="286" y="124" width="18" height="126" rx="3" opacity="0.60"/>
      <rect x="312" y="176" width="18" height="74"  rx="3" opacity="0.45"/>
    </g>
    <!-- race-day flag -->
    <g transform="translate(350,250)">
      <line x1="0" y1="0" x2="0" y2="-176" stroke="#1f6b52" stroke-width="2" stroke-dasharray="4 4"/>
      <line x1="0" y1="-176" x2="0" y2="-198" stroke="#1f6b52" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M0 -198 L 16 -193 L 0 -188 Z" fill="#27855f"/>
    </g>
    <!-- phase labels -->
    <g font-family="Inter" font-size="13" font-weight="600" fill="#6f7573"
       text-anchor="middle" letter-spacing="0.5">
      <text x="60"  y="278">BASE</text>
      <text x="170" y="278">BUILD</text>
      <text x="254" y="278">PEAK</text>
      <text x="320" y="278">TAPER</text>
    </g>
  </g>
</svg>
